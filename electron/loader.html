<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"/>
  <title>SFDC Metadata Visualizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080d18; color: #e2e8f0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
      user-select: none;
    }
    .logo { font-size: 48px; }
    h1 { font-size: 22px; font-weight: 800; color: #00d4ff; letter-spacing: 2px; }
    p  { font-size: 13px; color: #64748b; text-align: center; line-height: 1.8; max-width: 420px; }
    button {
      background: #00d4ff; color: #080d18;
      border: none; padding: 12px 32px; border-radius: 8px;
      font-family: inherit; font-size: 14px; font-weight: 800;
      cursor: pointer; letter-spacing: 1px; transition: opacity 0.15s;
    }
    button:hover  { opacity: 0.85; }
    button:active { opacity: 0.7;  }
    button:disabled { background: #1e2d45; color: #64748b; cursor: not-allowed; }
    #log {
      width: 520px; max-height: 200px; overflow-y: auto;
      background: #0f1624; border: 1px solid #1e2d45; border-radius: 8px;
      padding: 12px 16px; font-size: 11px; color: #64748b; line-height: 1.7;
      display: none;
    }
    #status { font-size: 12px; color: #f59e0b; min-height: 20px; }
    .done { color: #10b981 !important; }
    .err  { color: #ef4444 !important; }
  </style>
</head>
<body>
  <div class="logo">☁️</div>
  <h1>SFDC · METADATA VISUALIZER</h1>
  <p>Select your Salesforce metadata ZIP to parse and visualize your org's automation graph.</p>
  <button id="btn">📦  Open Metadata ZIP</button>
  <div id="status"></div>
  <pre id="log"></pre>

  <script>
    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');
    const log    = document.getElementById('log');

    btn.addEventListener('click', async () => {
      const pick = await window.electronAPI.pickZip();
      if (pick.canceled) return;

      btn.disabled = true;
      btn.textContent = '⏳  Parsing...';
      status.textContent = 'Running parser — this may take a minute for large ZIPs...';
      status.className = '';
      log.style.display = 'block';

      window.electronAPI.onParserLog(msg => {
        log.textContent += msg;
        log.scrollTop = log.scrollHeight;
      });

      const result = await window.electronAPI.runParser(pick.zipPath);

      if (result.ok) {
        status.textContent = '✅  Done! Loading viewer...';
        status.className = 'done';
        setTimeout(() => { window.location.href = '/index.html'; }, 800);
      } else {
        status.textContent = '❌  Parser failed. See log below.';
        status.className = 'err';
        log.textContent += '\n\nERROR:\n' + result.error;
        btn.disabled = false;
        btn.textContent = '📦  Try Again';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"/>
  <title>SFDC Metadata Visualizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080d18; color: #e2e8f0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      user-select: none;
    }
    .logo { font-size: 48px; }
    h1 { font-size: 20px; font-weight: 800; color: #00d4ff; letter-spacing: 2px; }
    p  { font-size: 12px; color: #64748b; text-align: center; line-height: 1.8; max-width: 420px; }
    button {
      background: #00d4ff; color: #080d18;
      border: none; padding: 12px 32px; border-radius: 8px;
      font-family: inherit; font-size: 13px; font-weight: 800;
      cursor: pointer; letter-spacing: 1px; transition: opacity 0.15s;
    }
    button:hover  { opacity: 0.85; }
    button:disabled { background: #1e2d45; color: #64748b; cursor: not-allowed; }
    #log {
      width: 560px; height: 200px; overflow-y: auto;
      background: #0f1624; border: 1px solid #1e2d45; border-radius: 8px;
      padding: 12px 16px; font-size: 11px; color: #64748b; line-height: 1.7;
      display: none; text-align: left; white-space: pre-wrap; word-break: break-all;
    }
    #status { font-size: 12px; color: #f59e0b; min-height: 20px; text-align: center; }
    .done   { color: #10b981 !important; }
    .err    { color: #ef4444 !important; }
    #retry  { display: none; }
  </style>
</head>
<body>
  <div class="logo">☁️</div>
  <h1>SFDC · METADATA VISUALIZER</h1>
  <p>Select your Salesforce metadata ZIP to parse and visualize your org's automation graph.</p>

  <button id="btn">📦  Open Metadata ZIP</button>
  <button id="retry">🔄  Try Again</button>
  <div id="status"></div>
  <pre id="log"></pre>

  <script>
    const btn    = document.getElementById('btn');
    const retry  = document.getElementById('retry');
    const status = document.getElementById('status');
    const log    = document.getElementById('log');

    function setStatus(msg, cls = '') {
      status.textContent = msg;
      status.className = cls;
    }

    function appendLog(msg) {
      log.style.display = 'block';
      log.textContent  += msg;
      log.scrollTop     = log.scrollHeight;
    }

    btn.addEventListener('click', runFlow);
    retry.addEventListener('click', () => {
      log.textContent = '';
      retry.style.display = 'none';
      btn.style.display = 'inline-block';
      setStatus('');
      runFlow();
    });

    async function runFlow() {
      const pick = await window.electronAPI.pickZip();
      if (pick.canceled) return;

      btn.style.display    = 'none';
      retry.style.display  = 'none';
      log.textContent      = '';
      log.style.display    = 'block';

      setStatus('⏳  Parsing metadata — please wait...');

      // Stream parser logs
      window.electronAPI.onParserLog(msg => appendLog(msg));

      appendLog(`ZIP: ${pick.zipPath}\n\n`);

      const result = await window.electronAPI.runParser(pick.zipPath);

      if (result.ok) {
        setStatus('✅  Done! Loading viewer...', 'done');
        setTimeout(() => { window.location.href = '/index.html'; }, 800);
      } else {
        setStatus('❌  Parser failed — see log below', 'err');
        appendLog(`\n\nERROR: ${result.error}\n`);
        appendLog('\nMake sure Node.js 18+ is installed: https://nodejs.org\n');
        retry.style.display = 'inline-block';
        btn.style.display   = 'none';
      }
    }
  </script>
</body>
</html>

name: Build & Release

# Triggers:
#   - Push a tag like v1.0.0  → full build + GitHub Release with EXE
#   - Manual trigger          → build only, no release
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release?'
        required: false
        default: 'false'
        type: boolean

jobs:

  # ── 1. Build the React viewer ───────────────────────────────────────────────
  build-viewer:
    name: Build Viewer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: viewer/package.json

      - name: Install viewer dependencies
        run: cd viewer && npm ci

      - name: Build viewer
        run: cd viewer && npm run build

      - name: Upload viewer dist
        uses: actions/upload-artifact@v4
        with:
          name: viewer-dist
          path: viewer/dist
          retention-days: 1

  # ── 2. Install parser dependencies ─────────────────────────────────────────
  build-parser:
    name: Install Parser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: parser/package.json

      - name: Install parser dependencies
        run: cd parser && npm ci

      - name: Upload parser with node_modules
        uses: actions/upload-artifact@v4
        with:
          name: parser-with-deps
          path: parser
          retention-days: 1

  # ── 3. Build Windows EXE (NSIS installer) ──────────────────────────────────
  build-windows:
    name: Build Windows EXE
    needs: [build-viewer, build-parser]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download viewer dist
        uses: actions/download-artifact@v4
        with:
          name: viewer-dist
          path: viewer/dist

      - name: Download parser
        uses: actions/download-artifact@v4
        with:
          name: parser-with-deps
          path: parser

      - name: Copy loader.html into viewer dist
        run: copy electron\loader.html viewer\dist\loader.html

      - name: Install root dependencies (electron-builder)
        run: npm install

      - name: Build Windows installer
        run: npm run build:electron -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-electron/*.exe
          retention-days: 7

  # ── 4. Build macOS DMG ──────────────────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    needs: [build-viewer, build-parser]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download viewer dist
        uses: actions/download-artifact@v4
        with:
          name: viewer-dist
          path: viewer/dist

      - name: Download parser
        uses: actions/download-artifact@v4
        with:
          name: parser-with-deps
          path: parser

      - name: Copy loader.html into viewer dist
        run: cp electron/loader.html viewer/dist/loader.html

      - name: Install root dependencies
        run: npm install

      - name: Build macOS DMG
        run: npm run build:electron -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist-electron/*.dmg
          retention-days: 7

  # ── 5. Create GitHub Release ────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release-assets

      - name: List release assets
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SFDC Metadata Visualizer ${{ github.ref_name }}"
          body: |
            ## SFDC Metadata Visualizer ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | Windows  | `SFDC-Metadata-Visualizer-Setup-*.exe` |
            | macOS    | `SFDC-Metadata-Visualizer-*.dmg`       |

            ### What's included
            - Parser — statically analyzes Flows, Triggers, Apex Classes, Objects, LWC, Aura, Platform Events, Formula Fields
            - DAG View — swimlane execution flow diagram
            - Object-Centric View — concentric ring impact map
            - Table View — searchable index with smart filters

            ### How to use
            1. Download and install the file for your OS
            2. Launch the app
            3. Click **Open Metadata ZIP** and select your Salesforce metadata ZIP
            4. The parser runs locally — no data leaves your machine

            ### Getting your metadata ZIP
            ```bash
            sf project retrieve start --manifest package.xml --target-dir ./retrieved
            # zip the retrieved/ folder
            ```
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
